name: CI
on:
    pull_request:
        branches: [master]
    push:
        branches: [master]
jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Install Dependencies
              run: pnpm install --frozen-lockfile
            - name: Typecheck
              run: pnpm typecheck
            - name: Build
              run: pnpm build
            - name: Test
              run: pnpm test
